<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SwiftDrop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:Inter,system-ui;
background:#f5f7fb;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
width:420px;
max-width:95%;
}

h1{
margin:0 0 15px;
font-weight:600;
}

button{
background:#0071e3;
border:none;
color:white;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
font-weight:600;
margin:5px 0;
width:100%;
}

button:hover{
background:#005bb5;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
margin:10px 0;
font-size:16px;
text-align:center;
letter-spacing:3px;
}

.progress{
height:10px;
background:#eee;
border-radius:10px;
margin-top:15px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#0071e3;
transition:.2s;
}

.fileBox{
border:2px dashed #d0d7e2;
padding:20px;
border-radius:15px;
text-align:center;
margin-top:15px;
}

.code{
font-size:32px;
font-weight:600;
letter-spacing:8px;
margin:15px 0;
}

small{
color:#666;
}
</style>
</head>

<body>

<div class="card">

<h1>SwiftDrop</h1>
<small>P2P encrypted transfer (no storage)</small>

<button onclick="createRoom()">Create connection</button>

<input id="roomInput" maxlength="6" placeholder="ENTER CODE" />

<button onclick="joinRoom()">Join</button>

<div id="code" class="code"></div>

<div class="fileBox" id="fileBox">
Drop file here
<input type="file" id="file" />
</div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

</div>

<script>

let pc;
let channel;
let file;
let receiveBuffer=[];
let receivedSize=0;
let room;

const config={
 iceServers:[
 {urls:'stun:stun.l.google.com:19302'}
 ]
};

const ws=new WebSocket("wss://signal.lol");

ws.onmessage=async msg=>{
let data=JSON.parse(msg.data);

if(data.room!==room)return;

if(data.offer){
await pc.setRemoteDescription(data.offer);
let answer=await pc.createAnswer();
await pc.setLocalDescription(answer);
ws.send(JSON.stringify({answer,room}));
}

if(data.answer){
await pc.setRemoteDescription(data.answer);
}

if(data.candidate){
pc.addIceCandidate(data.candidate);
}

}

function generateCode(){
return Math.floor(100000+Math.random()*900000).toString();
}

function setupPeer(){
pc=new RTCPeerConnection(config);

pc.onicecandidate=e=>{
if(e.candidate){
ws.send(JSON.stringify({candidate:e.candidate,room}));
}
};

pc.ondatachannel=e=>{
channel=e.channel;
setupReceive();
};
}

async function createRoom(){
room=generateCode();
document.getElementById("code").textContent=room;
setupPeer();

channel=pc.createDataChannel("file");
setupSend();

let offer=await pc.createOffer();
await pc.setLocalDescription(offer);

ws.send(JSON.stringify({offer,room}));
}

async function joinRoom(){
room=document.getElementById("roomInput").value;
setupPeer();
}

function setupSend(){
channel.onopen=()=>{
document.getElementById("file").onchange=e=>{
file=e.target.files[0];
sendFile();
};
};
}

function sendFile(){
let chunk=16384;
let offset=0;
let reader=new FileReader();

reader.onload=e=>{
channel.send(e.target.result);
offset+=e.target.result.byteLength;

let percent=(offset/file.size)*100;
document.getElementById("bar").style.width=percent+"%";

if(offset<file.size){
readSlice(offset);
}
};

function readSlice(o){
let slice=file.slice(o,o+chunk);
reader.readAsArrayBuffer(slice);
}

readSlice(0);
}

function setupReceive(){
channel.onmessage=e=>{
receiveBuffer.push(e.data);
receivedSize+=e.data.byteLength;

let percent=(receivedSize/100000000)*100;
document.getElementById("bar").style.width=Math.min(percent,100)+"%";

if(e.data.byteLength<16384){
let blob=new Blob(receiveBuffer);
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download="file";
a.click();
}
};
}

</script>

</body>
</html>
