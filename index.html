<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SwiftDrop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:Inter,system-ui;background:#f5f7fb;margin:0;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:white;padding:30px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.08);width:420px;max-width:95%}
h1{margin:0 0 10px;font-weight:600}
button{background:#0071e3;border:none;color:white;padding:12px;border-radius:12px;cursor:pointer;font-weight:600;margin-top:8px;width:100%}
button:hover{background:#005bb5}
input{width:100%;padding:12px;border-radius:12px;border:1px solid #ddd;margin-top:10px;font-size:16px;text-align:center;letter-spacing:3px}
.progress{height:10px;background:#eee;border-radius:10px;margin-top:15px;overflow:hidden}
.bar{height:100%;width:0%;background:#0071e3;transition:.2s}
.fileBox{border:2px dashed #d0d7e2;padding:20px;border-radius:15px;text-align:center;margin-top:15px}
.code{font-size:34px;font-weight:600;letter-spacing:8px;margin:15px 0}
small{color:#666}
</style>
</head>

<body>
<div class="card">
<h1>SwiftDrop</h1>
<small>Encrypted P2P transfer</small>

<button onclick="createRoom()">Create connection</button>
<div id="code" class="code"></div>

<input id="roomInput" maxlength="6" placeholder="ENTER CODE" />
<button onclick="joinRoom()">Join connection</button>

<div class="fileBox">
<input type="file" id="file" />
<button onclick="shareFile()">Share selected file</button>
</div>

<div class="progress"><div id="bar" class="bar"></div></div>

</div>

<script>
let pc;
let dc;
let room;
let file;
let fileSize=0;
let receivedSize=0;
let buffer=[];

const ws=new WebSocket("wss://ws.postman-echo.com/raw"); // stable echo socket

const config={iceServers:[{urls:["stun:stun.l.google.com:19302","stun:global.stun.twilio.com:3478"]}]};

ws.onmessage=async e=>{
let data;
try{data=JSON.parse(e.data);}catch{return}

if(data.room!==room) return;

if(data.join){
let offer=await pc.createOffer();
await pc.setLocalDescription(offer);
send({offer});
}

if(data.offer){
await pc.setRemoteDescription(data.offer);
let answer=await pc.createAnswer();
await pc.setLocalDescription(answer);
send({answer});
}

if(data.answer){
await pc.setRemoteDescription(data.answer);
}

if(data.candidate){
pc.addIceCandidate(data.candidate);
}

if(data.meta){
fileSize=data.meta.size;
}
};

function send(obj){
obj.room=room;
ws.send(JSON.stringify(obj));
}

function gen(){return Math.floor(100000+Math.random()*900000).toString()}

function peer(){
pc=new RTCPeerConnection(config);

pc.onicecandidate=e=>{
if(e.candidate) send({candidate:e.candidate});
};

pc.ondatachannel=e=>{
dc=e.channel;
receive();
};
}

function createRoom(){
room=gen();
document.getElementById("code").textContent=room;
peer();

dc=pc.createDataChannel("file");
sender();
}

function joinRoom(){
room=document.getElementById("roomInput").value;
if(room.length!==6) return alert("Enter valid code");
peer();
send({join:true});
}

function sender(){
dc.onopen=()=>console.log("connected");
}

function shareFile(){
file=document.getElementById("file").files[0];
if(!file) return alert("select file");

send({meta:{size:file.size,name:file.name}});

let chunk=65536;
let offset=0;
let reader=new FileReader();

reader.onload=e=>{
dc.send(e.target.result);
offset+=e.target.result.byteLength;

let percent=(offset/file.size)*100;
document.getElementById("bar").style.width=percent+"%";

if(offset<file.size){read(offset);}else{dc.send("EOF");}
};

function read(o){
let slice=file.slice(o,o+chunk);
reader.readAsArrayBuffer(slice);
}

read(0);
}

function receive(){
dc.onmessage=e=>{
if(e.data==="EOF"){
let blob=new Blob(buffer);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="file";
a.click();

buffer=[];
receivedSize=0;
return;
}

buffer.push(e.data);
receivedSize+=e.data.byteLength;

if(fileSize){
let percent=(receivedSize/fileSize)*100;
document.getElementById("bar").style.width=percent+"%";
}
};
}
</script>

</body>
</html>
